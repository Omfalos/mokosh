name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish to npm (e.g. v0.1.2)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Verify tag matches package.json version
        env:
          TAG: ${{ inputs.tag }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "v$PKG_VERSION" != "$TAG" ]; then
            echo "Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      # Trusted publishing (OIDC) needs npm >= 11.5.1; Node 24 bundles npm 11.x
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci

      - name: Build
        run: npm run build:prod

      - name: Run Tests
        run: npm test

      - name: Verify npm supports trusted publishing
        run: |
          NPM_VERSION=$(npm --version)
          echo "npm $NPM_VERSION"
          if [ "$(printf '%s\n' "11.5.1" "$NPM_VERSION" | sort -V | head -n1)" != "11.5.1" ]; then
            echo "npm $NPM_VERSION is too old for trusted publishing (need >= 11.5.1)"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public
